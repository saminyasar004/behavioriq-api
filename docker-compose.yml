version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: behavioriq-api-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: behavioriq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: behavioriq-api-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # behavioriq-api
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PORT=${PORT}
    # `localhost/` avoids Podman treating this as docker.io/library/behavioriq-api.
    image: localhost/behavioriq-api:node22
    container_name: behavioriq-api
    ports:
      - "${PORT}:${PORT}"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      REDIS_URL: ${DOCKER_REDIS_URL}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      GEMINI_AI_API_KEY: ${GEMINI_AI_API_KEY}
      # Until the container image is rebuilt on Node 22, Yarn would refuse
      # `@prisma/streams-local` on Node 20 during `yarn install` in `command:`.
      YARN_IGNORE_ENGINES: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      # Keep lockfile + manifest in sync with the host so `yarn install` in the command
      # picks up deps like `@prisma/adapter-pg` without relying on an old image layer.
      - ./package.json:/app/package.json:ro
      - ./yarn.lock:/app/yarn.lock:ro
    extra_hosts:
      - "host.containers.internal:host-gateway"
    command: sh -c "yarn install --frozen-lockfile && yarn db:generate && yarn db:push && yarn db:seed && yarn dev"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: behavioriq-api-network
